name: windows

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-cache,readwrite
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout vcpkg
        uses: actions/checkout@v7
        with:
          repository: microsoft/vcpkg
          ref: 18a4723aeb7adbbae84bcff0edf510883800f32f
          path: vcpkg

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Cache vcpkg artifacts
        uses: actions/cache@v6
        with:
          path: |
            ${{ github.workspace }}\vcpkg\installed
            ${{ github.workspace }}\vcpkg\downloads
            ${{ github.workspace }}\vcpkg\buildtrees
            ${{ github.workspace }}\vcpkg\packages
            ${{ github.workspace }}\vcpkg-cache
          key: windows-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            windows-vcpkg-

      - name: Configure Debug
        run: cmake --preset windows-msvc-debug

      - name: Build Debug
        run: cmake --build --preset windows-msvc-debug

      - name: Test Debug
        run: ctest --preset windows-msvc-debug --output-on-failure

      - name: Configure Release
        run: cmake --preset windows-msvc-release

      - name: Build Release smoke
        run: cmake --build --preset windows-msvc-release

      - name: Package Release executable
        shell: pwsh
        run: |
          $packageDir = "artifact\flash-view-windows-x64"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "build\windows-msvc-release\Release\fast_viewer.exe" $packageDir
          Copy-Item "build\windows-msvc-release\Release\FlashViewAssociate.exe" $packageDir
          Copy-Item "build\windows-msvc-release\Release\FlashViewUnassociate.exe" $packageDir
          Copy-Item "tools\register_file_associations.ps1" $packageDir
          Copy-Item "tools\unregister_file_associations.ps1" $packageDir

      - name: Upload Release executable
        uses: actions/upload-artifact@v4
        with:
          name: flash-view-windows-x64
          path: artifact/flash-view-windows-x64
          if-no-files-found: error
